config:
  validation: true

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FileBasedFindingsReport'

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: true
    # detekt 2.0 removed licenseTemplateFile (file-based) support; the regex must be inlined directly
    licenseTemplate: '^// Copyright \d{4} Amazon.com, Inc. or its affiliates. All Rights Reserved.\n// SPDX-License-Identifier: Apache-2.0\n?'
    licenseTemplateIsRegex: true

complexity:
  active: false

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    active: false
  SuspendFunWithFlowReturnType:
    active: true

empty-blocks:
  EmptyFunctionBlock:
    active: false

exceptions:
  # there might actually be some useful rules in here
  active: false

# unfortunately, does not respect .editorconfig in the project folder
# this configuration reflects the delta from the default ktlint rule set
ktlint:
  active: true
  android: false
  autoCorrect: true
  AnnotationOnSeparateLine:
    active: false
  CommentWrapping:
    active: false
  Filename:
    active: false
  Kdoc:
    active: false
  MixedConditionOperators:
    active: false
  NoEmptyFile:
    active: false
  AnnotationSpacing:
    active: false
  ArgumentListWrapping:
    active: true
    indentSize: 4
    maxLineLength: 160
  Indentation:
    active: true
    indentSize: 4
    excludes: [ '**/TelemetryDefinitions.kt' ]
  PropertyName:
    active: false
  MaximumLineLength:
    active: true
    maxLineLength: 160
    ignoreBackTickedIdentifier: true
  NoWildcardImports:
    packagesToUseImportOnDemandProperty: ""
    active: true
  ParameterListWrapping:
    active: true
    indentSize: 4
    maxLineLength: 160
  ParameterWrapping:
    active: true
    indentSize: 4
    maxLineLength: 160
  PropertyWrapping:
    active: true
    indentSize: 4
    maxLineLength: 160
  SpacingBetweenDeclarationsWithComments:
    active: true
    excludes: [ '**/icons/**' ]
  #  TrailingCommaOnCallSite:
  #    active: true
  TrailingCommaOnDeclarationSite:
    active: true
  Wrapping:
    active: true
    indentSize: 4
    maxLineLength: 160

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    privateParameterPattern: '[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'
  EnumNaming:
    active: true
    enumEntryPattern: '[A-Z][_a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
    excludeClassPattern: '$^'
    ignoreAnnotated: [ 'Composable' ]
    excludes: [ '**/tst/**', '**/it/**' ]
  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'
  # prefer rule provided by ktlint
  MatchingDeclarationName:
    active: false
  MemberNameEqualsClassName:
    active: false
  NoNameShadowing:
    active: true
  ObjectPropertyNaming:
    active: true
    constantPattern: '[A-Za-z][_A-Za-z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '(_)?[A-Za-z][_A-Za-z0-9]*'
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '_?[A-Za-z][_A-Za-z0-9]*'
    # detekt 2.0 now correctly checks private top-level consts too, surfacing pre-existing camelCase names
    excludes: [
      '**/services/sqs/SqsUtils.kt',
      '**/services/cloudformation/stack/EventsFetcherTest.kt'
    ]
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    privateVariablePattern: '(_)?[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'
    excludes: [
      '**/uitests/tests/InsightsQueryTest.kt',
      '**/uitests/tests/S3BrowserTest.kt'
    ]

performance:
  SpreadOperator:
    active: false

potential-bugs:
  active: true
  CastToNullableType:
    active: false
  Deprecation:
    active: false
  DontDowncastCollectionTypes:
    active: false
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  EqualsWithHashCodeExist:
    active: true
  ExitOutsideMain:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  HasPlatformType:
    active: false
  IgnoredReturnValue:
    active: false
  ImplicitDefaultLocale:
    active: false
  ImplicitUnitReturnType:
    active: false
    allowExplicitReturnType: true
  InvalidRange:
    active: true
  IteratorHasNextCallsNextMethod:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true
  MapGetWithNotNullAssertionOperator:
    active: false
  NullableToStringCall:
    active: false
  UnconditionalJumpStatementInLoop:
    active: false
  UnnecessaryNotNullOperator:
    active: true
  UnnecessarySafeCall:
    active: true
  UnreachableCatchBlock:
    active: true
  # doesn't seem to work correctly on our codebase
  # qodana provides coverage for this
  UnreachableCode:
    active: false
  UnsafeCallOnNullableType:
    active: true
  UnsafeCast:
    active: true
  UnusedUnaryOperator:
    active: false
  UselessPostfixExpression:
    active: false
  WrongEqualsTypeParameter:
    active: true

style:
  AbstractClassCanBeConcreteClass:
    active: false
  AbstractClassCanBeInterface:
    active: false
  ExpressionBodySyntax:
    active: true
    includeLineWrapping: true
    excludes: [ '**/services/caws/CawsProjectListRenderer.kt' ]
  LoopWithTooManyJumpStatements:
    excludes: [ '**/services/s3/objectActions/DownloadObjectAction.kt' ]
  ForbiddenComment:
    active: false
  MagicNumber:
    active: false
  # prefer rule provided by ktlint
  MaxLineLength:
    active: false
  # prefer rule provided by ktlint
  ModifierOrder:
    active: false
  # prefer rule provided by ktlint
  NewLineAtEndOfFile:
    active: false
  NoTabs:
    active: true
  ReturnCount:
    active: false
  ThrowsCount:
    active: false
  UseCheckOrError:
    active: false
  UseOrEmpty:
    active: false
  UseRequire:
    active: false
  UnusedParameter:
    excludes: [ '**/services/lambda/completion/DotNetHandlerCompletionProviderTest.kt' ]
  UnusedPrivateFunction:
    allowedNames: '(_|ignored|expected|serialVersionUID|createUIComponents)'
  UnusedPrivateProperty:
    allowedNames: '(_|ignored|expected|serialVersionUID|createUIComponents)'
    excludes: [ '**/resources/tst/software/aws/toolkits/resources/BundledResourcesTest.kt' ]
  VarCouldBeVal:
    active: false
